<div class="login-page">
  <div class="left-panel">
    <div class="brand-content">
      <div class="brand-logo">
        <div class="icon-box">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="8" height="8" x="3" y="3" rx="2" />
            <path d="M7 11v4a2 2 0 0 0 2 2h4" />
            <rect width="8" height="8" x="13" y="13" rx="2" />
          </svg>
        </div>
        <span class="brand-name">Orquestia</span>
      </div>
      <div class="brand-text">
        <h1>Empieza a orquestar tus procesos hoy</h1>
        <p>Crea tu cuenta y en minutos tendrás tu primer workflow en funcionamiento.</p>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <div class="form-container">
      <div class="header-text">
        <h2>Crea tu cuenta</h2>
        <p>Regístrate gratis — sin tarjeta de crédito</p>
      </div>

      <form (ngSubmit)="onRegister()" class="login-form">
        <div class="row-2">
          <div class="input-group">
            <label for="nombre">Nombre</label>
            <input id="nombre" type="text" placeholder="Juan" [(ngModel)]="nombre" name="nombre" required>
          </div>
          <div class="input-group">
            <label for="apellido">Apellido</label>
            <input id="apellido" type="text" placeholder="Pérez" [(ngModel)]="apellido" name="apellido" required>
          </div>
        </div>

        <div class="input-group">
          <label for="email">Email corporativo</label>
          <input id="email" type="email" placeholder="juan@empresa.com" [(ngModel)]="email" name="email" required>
        </div>

        <div class="input-group">
          <label for="password">Contraseña</label>
          <div class="password-wrapper">
            <input id="password" [type]="showPassword ? 'text' : 'password'" placeholder="Mínimo 6 caracteres"
              [(ngModel)]="password" name="password" required>
            <button type="button" (click)="togglePassword()" class="toggle-password">
              @if (showPassword) {
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24" /><path
                  d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68" /><path
                  d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61" /><line x1="2" x2="22" y1="2" y2="22" /></svg>
              } @else {
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0" /><circle cx="12" cy="12" r="3" /></svg>
              }
            </button>
          </div>
        </div>

        <div class="input-group">
          <label for="confirm">Confirmar contraseña</label>
          <input id="confirm" [type]="showPassword ? 'text' : 'password'" placeholder="Repite tu contraseña"
            [(ngModel)]="confirmPassword" name="confirm" required>
        </div>

        @if (error()) {
          <div class="error-msg">{{ error() }}</div>
        }

        <button type="submit" class="submit-btn" [disabled]="loading()">
          @if (loading()) {
            <span class="btn-content">
              <svg class="spinner" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56" /></svg>
              Creando cuenta...
            </span>
          } @else {
            <span class="btn-content">
              Crear cuenta
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2"><path d="M5 12h14" /><path d="m12 5 7 7-7 7" /></svg>
            </span>
          }
        </button>
      </form>

      <p class="signup-link-text">
        ¿Ya tienes cuenta? <a routerLink="/login">Iniciar sesión</a>
      </p>
    </div>
  </div>
</div>
