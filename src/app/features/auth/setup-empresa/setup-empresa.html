<div class="setup-page">
  <div class="setup-card">
    <!-- Header con logo y saludo -->
    <div class="setup-header">
      <div class="icon-box">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect width="8" height="8" x="3" y="3" rx="2" />
          <path d="M7 11v4a2 2 0 0 0 2 2h4" />
          <rect width="8" height="8" x="13" y="13" rx="2" />
        </svg>
      </div>
      <span class="brand">Orquestia</span>
    </div>

    <div class="setup-body">
      <div class="step-indicator">
        <span class="step done">✓ Cuenta creada</span>
        <div class="step-line"></div>
        <span class="step active">Configura tu empresa</span>
        <div class="step-line"></div>
        <span class="step">Dashboard</span>
      </div>

      <h2>¡Bienvenido a Orquestia!</h2>
      <p class="subtitle">
        Solo necesitamos algunos datos de tu organización para configurar tu espacio de trabajo.
      </p>

      <form (ngSubmit)="onSetup()" class="setup-form">
        <div class="input-group">
          <label for="nombre">Nombre de la empresa *</label>
          <input id="nombre" type="text" placeholder="Ej: CRE Energía Eléctrica S.A."
            [(ngModel)]="nombre" name="nombre" required>
        </div>

        <div class="input-group">
          <label for="rubro">Sector / Rubro *</label>
          <select id="rubro" [(ngModel)]="rubro" name="rubro" required>
            <option value="" disabled selected>Selecciona el sector de tu empresa</option>
            @for (r of rubros; track r) {
              <option [value]="r">{{ r }}</option>
            }
          </select>
        </div>

        <div class="input-group">
          <label for="desc">Descripción <span class="optional">(opcional)</span></label>
          <textarea id="desc" rows="3" placeholder="Breve descripción de tu empresa y sus actividades..."
            [(ngModel)]="descripcion" name="desc"></textarea>
        </div>

        @if (error()) {
          <div class="error-msg">{{ error() }}</div>
        }

        <button type="submit" class="submit-btn" [disabled]="loading() || !nombre || !rubro">
          @if (loading()) {
            <span class="btn-content">
              <svg class="spinner" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56" /></svg>
              Configurando tu espacio...
            </span>
          } @else {
            <span class="btn-content">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
              Ir a mi Dashboard
            </span>
          }
        </button>
      </form>
    </div>
  </div>
</div>
